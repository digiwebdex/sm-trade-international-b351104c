version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-smtrade_db}
      POSTGRES_USER: ${DB_USER:-smtrade_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/constraints.sql:/docker-entrypoint-initdb.d/02-constraints.sql
      - ./database/functions.sql:/docker-entrypoint-initdb.d/03-functions.sql
      - ./database/indexes.sql:/docker-entrypoint-initdb.d/04-indexes.sql
    ports:
      - "127.0.0.1:5433:5432"  # Use 5433 to avoid conflict with host PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smtrade_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smtrade_db}
      DB_USER: ${DB_USER:-smtrade_user}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      API_BASE_URL: ${API_BASE_URL:-https://smtradeint.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://smtradeint.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:4000:4000"

volumes:
  pgdata:
  uploads:
